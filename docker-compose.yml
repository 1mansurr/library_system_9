services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: library
    volumes:
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build: ./user-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/users_db
      DB_USER: library
      DB_PASSWORD: library
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  book-service:
    build: ./book-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/books_db
      DB_USER: library
      DB_PASSWORD: library
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  loan-service:
    build: ./loan-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/loans_db
      DB_USER: library
      DB_PASSWORD: library
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      USER_SERVICE_URL: http://user-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      LOAN_PERIOD_DAYS: 14
      DAILY_RATE: 0.50
      MAX_ACTIVE_LOANS_PER_USER: 5
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      book-service:
        condition: service_started

volumes:
  pgdata:
